version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: todo_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: TodoManagementDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Set ASP.NET Core to listen on port 3087 inside the container
      - ASPNETCORE_URLS=http://+:3087
      # Override the DefaultConnection string to point to the 'db' container
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=TodoManagementDb;Username=postgres;Password=postgrespassword
    ports:
      - "3087:3087"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data: